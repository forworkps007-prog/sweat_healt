<!DOCTYPE html>
<html lang="th">

<head>
<link rel="apple-touch-icon" href="helt.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2196F3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Sweat Health Monitor</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('https://forworkps007-prog.github.io/sweat_healt/script.js');
  }
</script>
<body>
  <div id="loginOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0d1117; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; font-family:sans-serif; transition: 0.5s;">
    <img src="helt.png" width="100" style="margin-bottom:20px;">
    
    <div id="authBox" style="text-align: center;">
        <h2 id="authTitle">Sweat Health Login</h2>
        
        <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน" style="padding:12px; margin:10px; border-radius:8px; border:none; width:250px; display:block;">
        <input type="password" id="password" placeholder="รหัสผ่าน" style="padding:12px; margin:10px; border-radius:8px; border:none; width:250px; display:block;">
        
        <button id="mainBtn" onclick="handleAuth()" style="padding:12px 40px; background:#22c55e; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:10px; width:250px;">เข้าสู่ระบบ</button>
        
        <p style="margin-top:20px; font-size:14px; color:#94a3b8;">
            <span id="toggleText">ยังไม่มีบัญชีใช่ไหม?</span> 
            <a href="javascript:void(0)" onclick="toggleAuthMode()" id="toggleBtn" style="color:#38bdf8; text-decoration:none; font-weight:bold;">สมัครสมาชิก</a>
        </p>
        
        <p id="authError" style="color:#ef4444; margin-top:15px; display:none;"></p>
    </div>
</div>

<h1>🩺 Sweat Health Dashboard</h1>
<p>ระบบตรวจสุขภาพจากเหงื่อ</p>

<div class="card">
<h3>Health Data ex</h3>

<p>Glucose: <span id="glucose">--</span></p>
<p>Lactate: <span id="lactate">--</span></p>
<p>Sodium: <span id="sodium">--</span></p>
<p>pH: <span id="ph">--</span></p>
<p>Hydration: <span id="hydration">--</span>%</p>

<button onclick="testData()">อ่านค่า Sensor</button>

</div>

<div class="chartBox">

<canvas id="healthChart"></canvas>

</div>

<script src="script.js"></script>

</body>
</html>
<p id="footerText">ส่งแล้ว เขียนถึง <span id="userNameDisplay">...</span> โดย ศิริชัย ชาที</p>
